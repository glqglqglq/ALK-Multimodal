# ==========================================================
# ALK Rearrangement Prediction: Global Configuration
# ==========================================================

project:
  name: "ALK-Multimodal-PFM"
  version: "1.0.0"
  device: "cuda"  # Set to 'cpu' if GPU is unavailable

# ----------------------------------------------------------
# Data Path Settings (Placeholders for Anonymity)
# ----------------------------------------------------------
paths:
  # Raw and Processed Radiology Data
  ct_raw_dir: "data/raw/ct_images/"
  roi_processed_dir: "data/processed/roi_32/"
  
  # Cohort Label Files (CSV/Excel)
  train_csv: "data/labels/training_set.csv"
  val_csv: "data/labels/validation_set.csv"
  external_csv: "data/labels/external_test_set.csv"
  
  # Pathology Features (Extracted via Virchow2)
  pfm_feature_dir: "data/features/pathology_pfm/"
  
  # Checkpoints and Output
  pretrained_rad_weights: "weights/resnet_18_23dataset.pth" # Tencent MedicalNet
  model_save_path: "checkpoints/best_fusion_model.pth"
  output_dir: "results/600dpi_figures/"

# ----------------------------------------------------------
# Model Hyperparameters
# ----------------------------------------------------------
model:
  [cite_start]input_size: [32, 32, 32] # 3D ROI dimensions [cite: 59]
  [cite_start]wsi_feature_dim: 512     # Output dimension from Virchow2 [cite: 69]
  rad_feature_dim: 1024    # Global Aggregated Radiology Features
  [cite_start]hidden_dim: 128          # Shared latent space dimension [cite: 76]
  fusion_strategy: "cross_attention" # Options: [concat, gated, cross_attention]

# ----------------------------------------------------------
# Training Protocol
# ----------------------------------------------------------
training:
  [cite_start]batch_size: 32           # [cite: 94]
  learning_rate: 0.0001
  [cite_start]weight_decay: 0.05       # [cite: 94]
  [cite_start]epochs: 100              # [cite: 95]
  [cite_start]early_stopping_patience: 15 # [cite: 96]
  label_smoothing: 0.1

# ----------------------------------------------------------
# Visualization & Interpretability
# ----------------------------------------------------------
interpretability:
  [cite_start]dpi: 600                 # Publication-quality resolution [cite: 109]
  cmap_radiology: "jet"
  cmap_pathology: "coolwarm"
  shap_samples: 100        # Background samples for GradientExplainer